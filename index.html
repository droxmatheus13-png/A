<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infinity Web 3D</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }

#menu {
position:absolute;
width:100%;
height:100%;
background:linear-gradient(black,#111);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:10;
}

button {
padding:15px 25px;
margin:10px;
border:none;
border-radius:20px;
background:#00ffcc;
font-size:18px;
}

#joystick {
position:absolute;
bottom:40px;
left:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

#knob {
position:absolute;
width:60px;
height:60px;
background:#00ffcc;
border-radius:50%;
left:30px;
top:30px;
}

#slideBtn {
position:absolute;
bottom:60px;
right:60px;
width:80px;
height:80px;
border-radius:50%;
background:red;
}
</style>
</head>
<body>

<div id="menu">
<h1>INFINITY WEB 3D</h1>
<button onclick="startGame()">JOGAR</button>
</div>

<div id="joystick">
<div id="knob"></div>
</div>

<button id="slideBtn">🦵</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, ground;
let moveX=0, moveZ=0;
let velocityY=0;
let isSliding=false;
let lookX=0, lookY=0;

function init(){
scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 50, 200);

camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,100,50);
scene.add(light);

let ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

player = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0x00ffcc})
);
scene.add(player);

camera.position.set(0,2,5);

createGround();
animate();
}

function createGround(){
ground = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x222222})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);
}

function animate(){
requestAnimationFrame(animate);

player.position.x += moveX * 0.1;
player.position.z += moveZ * 0.1;

camera.position.x = player.position.x;
camera.position.z = player.position.z + 5;

camera.lookAt(player.position);

renderer.render(scene,camera);
}

function startGame(){
document.getElementById("menu").style.display="none";
init();
}

/* ========= JOYSTICK ========= */

const joystick = document.getElementById("joystick");
const knob = document.getElementById("knob");

let dragging=false;

joystick.addEventListener("touchstart", ()=> dragging=true);
joystick.addEventListener("touchend", ()=> {
dragging=false;
moveX=0;
moveZ=0;
knob.style.left="30px";
knob.style.top="30px";
});

joystick.addEventListener("touchmove",(e)=>{
if(!dragging) return;

let rect = joystick.getBoundingClientRect();
let x = e.touches[0].clientX - rect.left - 60;
let y = e.touches[0].clientY - rect.top - 60;

x=Math.max(-30,Math.min(30,x));
y=Math.max(-30,Math.min(30,y));

knob.style.left=(x+30)+"px";
knob.style.top=(y+30)+"px";

moveX = x/30;
moveZ = y/30;
});

/* ========= LOOK ========= */

let prevX=0;
window.addEventListener("touchstart",(e)=>{
prevX=e.touches[0].clientX;
});

window.addEventListener("touchmove",(e)=>{
let delta = e.touches[0].clientX - prevX;
player.rotation.y -= delta*0.005;
prevX=e.touches[0].clientX;
});

/* ========= SLIDE ========= */

document.getElementById("slideBtn").onclick=()=>{
if(isSliding) return;
isSliding=true;

player.scale.y=0.5;

setTimeout(()=>{
player.scale.y=1;
isSliding=false;
},500);
};
</script>

</body>
</html>

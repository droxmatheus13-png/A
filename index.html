<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Slazeer 3D Engine</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

/* Joystick */
#joystickBase {
    position:absolute;
    bottom:80px;
    left:40px;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
    touch-action:none;
}
#joystick {
    position:absolute;
    width:60px;
    height:60px;
    background:white;
    border-radius:50%;
    left:30px;
    top:30px;
}

/* Camera Button */
#camBtn {
    position:absolute;
    bottom:100px;
    right:40px;
    padding:15px;
    background:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="joystickBase">
    <div id="joystick"></div>
</div>

<button id="camBtn">3ª Pessoa</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// ===== CENA =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LUZ =====
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);

// ===== CHÃO INFINITO =====
const groundGeo = new THREE.PlaneGeometry(1000,1000);
const groundMat = new THREE.MeshStandardMaterial({color:0x222222});
const ground = new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== PERSONAGEM ESTILO ROBLOX =====
const player = new THREE.Group();

function cube(w,h,d,color,x,y,z){
    const geo = new THREE.BoxGeometry(w,h,d);
    const mat = new THREE.MeshStandardMaterial({color:color});
    const mesh = new THREE.Mesh(geo,mat);
    mesh.position.set(x,y,z);
    return mesh;
}

// Corpo
player.add(cube(1,1.5,0.6,0x00ffcc,0,1,0));
// Cabeça
player.add(cube(0.8,0.8,0.8,0xffcc99,0,2.2,0));
// Pernas
player.add(cube(0.4,1,0.4,0x0000ff,-0.3,0.5,0));
player.add(cube(0.4,1,0.4,0x0000ff,0.3,0.5,0));
// Braços
player.add(cube(0.4,1.2,0.4,0xffcc99,-0.8,1.3,0));
player.add(cube(0.4,1.2,0.4,0xffcc99,0.8,1.3,0));

scene.add(player);
player.position.y = 0;

// ===== CONTROLES =====
let moveX = 0;
let moveZ = 0;
let speed = 0.1;
let cameraMode = "third";

// JOYSTICK
const joy = document.getElementById("joystick");
const joyBase = document.getElementById("joystickBase");

joyBase.addEventListener("touchmove", (e)=>{
    const rect = joyBase.getBoundingClientRect();
    const touch = e.touches[0];
    let x = touch.clientX - rect.left - 60;
    let y = touch.clientY - rect.top - 60;

    const dist = Math.sqrt(x*x + y*y);
    if(dist > 40){
        x = x/dist*40;
        y = y/dist*40;
    }

    joy.style.left = x+30+"px";
    joy.style.top = y+30+"px";

    moveX = x/40;
    moveZ = y/40;
});

joyBase.addEventListener("touchend", ()=>{
    joy.style.left = "30px";
    joy.style.top = "30px";
    moveX = 0;
    moveZ = 0;
});

// ===== OLHAR ARRASTANDO =====
let rotY = 0;

document.addEventListener("touchmove", (e)=>{
    if(e.target === joy || e.target === joyBase) return;
    rotY -= e.touches[0].movementX * 0.002;
});

// ===== BOTÃO CÂMERA =====
document.getElementById("camBtn").onclick = ()=>{
    if(cameraMode === "third"){
        cameraMode = "first";
        document.getElementById("camBtn").innerText = "1ª Pessoa";
    }else{
        cameraMode = "third";
        document.getElementById("camBtn").innerText = "3ª Pessoa";
    }
};

// ===== LOOP =====
function animate(){
    requestAnimationFrame(animate);

    // Movimento
    player.position.x -= moveX * speed * Math.cos(rotY);
    player.position.z -= moveZ * speed;

    player.rotation.y = rotY;

    // Câmera
    if(cameraMode === "third"){
        camera.position.x = player.position.x + Math.sin(rotY)*5;
        camera.position.z = player.position.z + Math.cos(rotY)*5;
        camera.position.y = player.position.y + 4;
        camera.lookAt(player.position);
    } else {
        camera.position.x = player.position.x;
        camera.position.y = player.position.y + 2;
        camera.position.z = player.position.z;
        camera.rotation.y = rotY;
    }

    renderer.render(scene,camera);
}

animate();

// Resize
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
      </html>
